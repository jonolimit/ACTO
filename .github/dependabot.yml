# Dependabot configuration
# Disabled for GitHub Actions to reduce noise

version: 2
updates:
  # Disable GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"  # Only check monthly instead of daily
    open-pull-requests-limit: 0  # Don't create PRs automatically

  # Keep Python dependency updates (optional - also disabled)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
